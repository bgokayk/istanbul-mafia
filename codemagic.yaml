workflows:
  ios-app-store:
    name: Istanbul Mafia — iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.lumenco.istanbulmafia
      vars:
        BUNDLE_ID: com.lumenco.istanbulmafia
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APPLE_ID: $APP_STORE_APPLE_ID       # Set in Codemagic dashboard
      node: 20.x
      xcode: latest
      cocoapods: default

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Add iOS platform (if not present)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set bundle identifier
        script: |
          cd ios/App
          xcrun agvtool new-version -all $BUILD_NUMBER
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" App/Info.plist

      - name: Build iOS (Archive)
        script: |
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates

      - name: Export IPA
        script: |
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist /tmp/export_options.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ipa/*.ipa
      - build/App.xcarchive

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY      # Set in Codemagic dashboard
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER    # Set in Codemagic dashboard
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID      # Set in Codemagic dashboard
        submit_to_testflight: true
        submit_to_app_store: false                   # true yaparsan direkt App Store'a gönderir
      email:
        recipients:
          - $NOTIFICATION_EMAIL
        notify:
          success: true
          failure: true
